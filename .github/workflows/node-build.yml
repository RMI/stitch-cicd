on:
  workflow_call:

jobs:
  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: deployments/stitch-frontend/package.json
          cache: "npm"
          cache-dependency-path: deployments/stitch-frontend/package-lock.json

      - name: Build
        run: make frontend-build

      - name: Prepare Tarball
        run: tar -czf dist.tgz -C deployments/stitch-fronten/dist .

      - name: Check for dist.tgz
        id: check_artifact
        shell: bash
        run: |
          if [[ -f dist.tgz ]]; then
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifact=false" >> "$GITHUB_OUTPUT"
          fi

        # Reuse the artifact for downstream deploy
      - name: Upload dist.tgz as workflow artifact
        if: ${{ steps.check_artifact.outputs.has_artifact == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: dist-tgz
          path: dist.tgz
          if-no-files-found: error
