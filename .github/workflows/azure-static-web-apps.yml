name: Azure Static Web Apps CI/CD

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Uploaded frontend artifact name"
        required: true
        type: string
      app-env:
        description: "Runtime app environment label"
        required: true
        type: string
      api-url:
        description: "Base API URL to inject into runtime config"
        required: true
        type: string
      entity-linkage-url:
        description: "Base entity linkage URL to inject into runtime config"
        required: true
        type: string
      auth0-domain:
        description: "Auth0 domain"
        required: true
        type: string
      auth0-client-id:
        description: "Auth0 client ID"
        required: true
        type: string
      auth0-audience:
        description: "Auth0 audience"
        required: true
        type: string

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      checks: write
      contents: read
      id-token: write
      pull-requests: write
    steps:

      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: /tmp/frontend-artifact

      - name: Inspect downloaded artifact
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloaded artifact directory:"
          pwd
          ls -la /tmp/frontend-artifact
          echo
          echo "Tarball contents:"
          tar -tzf /tmp/frontend-artifact/dist.tgz | sed -n '1,120p'

      - name: Extract frontend dist
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .swa-dist
          mkdir -p .swa-dist
          tar -xzf /tmp/frontend-artifact/dist.tgz -C .swa-dist

          echo "Extracted files:"
          find /tmp/frontend-dist -maxdepth 3 -type f | sort | sed -n '1,200p'

          test -f /tmp/frontend-dist/index.html || {
            echo "Expected /tmp/frontend-dist/index.html but it was not found" >&2
            exit 1
          }

      - name: Generate runtime config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          CONFIG_ID="cfg-${{ inputs.app-env }}-$(date -u +'%Y%m%dT%H%M%SZ')"

          cat > /tmp/frontend-dist/config.json <<EOF
          {
            "appEnv": "${{ inputs.app-env }}",
            "apiUrl": "${{ inputs.api-url }}",
            "entityLinkageUrl": "${{ inputs.entity-linkage-url }}",
            "auth0Domain": "${{ inputs.auth0-domain }}",
            "auth0ClientId": "${{ inputs.auth0-client-id }}",
            "auth0Audience": "${{ inputs.auth0-audience }}",
            "configId": "${CONFIG_ID}",
            "configTime": "${CONFIG_TIME}"
          }
          EOF

          echo "Generated config.json:"
          cat /tmp/frontend-dist/config.json

      - name: Add SWA cache-control config
        shell: bash
        run: |
          set -euo pipefail
          cp deployments/stitch-frontend/public/staticwebapp.config.json /tmp/frontend-dist/staticwebapp.config.json

          echo "Final deploy directory:"
          find /tmp/frontend-dist -maxdepth 2 -type f | sort | sed -n '1,200p'

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: ".swa-dist"
          skip_api_build: true
