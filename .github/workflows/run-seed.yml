name: Run seed job

on:
  workflow_call:
    inputs:
      full-image-name:
        description: "Full pushed image name including host/registry, name, and digest"
        required: true
        type: string
      api-url:
        description: "Base API URL for the deployed API"
        required: true
        type: string

jobs:
  run-seed:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    timeout-minutes: 25

    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull seed image
        run: docker pull "${{ inputs.full-image-name }}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Run seed job
        env:
          API_BASE_URL: ${{ inputs.api-url }}
          FAKER_POST_COUNT: "5"
          LOG_LEVEL: "INFO"
          RANDOM_SEED: "8675309"
          SEED_SOURCE: "mixed"
          NULL_PROBABILITY: "0.3"
          STATIC_PAYLOAD_DIR: "/mnt/data"
        run: |
          set -euo pipefail

          docker run --rm \
            -e LOG_LEVEL \
            -e API_BASE_URL \
            -e FAKER_POST_COUNT \
            -e RANDOM_SEED \
            -e SEED_SOURCE \
            -e NULL_PROBABILITY \
            -e STATIC_PAYLOAD_DIR \
            -v "$GITHUB_WORKSPACE/deployments/seed/data:/mnt/data:ro" \
            "${{ inputs.full-image-name }}"
