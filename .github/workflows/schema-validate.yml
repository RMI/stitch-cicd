name: Validate JSON Schemas

on:
  pull_request:
    paths:
      - 'schema/sources/**/*.json'
      - 'schema/bin/validate_schemas.*'
      - '.github/workflows/schema-validate.yml'
  push:
    branches:
      - main
    paths:
      - 'schema/sources/**/*.json'
      - 'schema/bin/validate_schemas.*'
      - '.github/workflows/schema-validate.yml'

jobs:
  validate:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "schema/.python-version"

      - name: Install dependencies
        run: |
          uv pip install --upgrade pip
          uv pip install check-jsonschema

      - name: Make script executable
        run: |
          chmod +x schema/bin/validate_schemas.sh

      - name: Validate Schemas
        working-directory: schema
        run: ./bin/validate_schemas.sh
