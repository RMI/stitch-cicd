services:

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    profiles: ["tools", "full"]
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: deployments/seed/Dockerfile
    env_file:
      - .env
    environment:
      # Inside compose network, talk to the api service by name.
      API_BASE_URL: ${SEED_API_BASE_URL:-http://api:8000/api/v1}
      FAKER_POST_COUNT: ${SEED_FAKER_POST_COUNT:-5}
      LOG_LEVEL: ${SEED_LOG_LEVEL:-INFO}
      RANDOM_SEED: 8675309
      SEED_SOURCE: "mixed"
      NULL_PROBABILITY: 0.3
      STATIC_PAYLOAD_DIR: "/mnt/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deployments/seed/data:/mnt/data:ro
    restart: "no"
    profiles: ["seed", "full"]

  entity-linkage:
    build:
      context: .
      dockerfile: deployments/entity-linkage/Dockerfile
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${ENTITYLINKAGE_LOG_LEVEL:-info}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).read()\" || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
      start_interval: 1s
    ports:
      - "8001:8000"
    profiles: ["entity-linkage", "full", "friends"]
    depends_on:
      api:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
