services:

  api:
    environment:
      LOG_LEVEL: debug

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    profiles: ["tools", "full"]
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: deployments/seed/Dockerfile
    env_file:
      - .env
    environment:
      # Inside compose network, talk to the api service by name.
      API_BASE_URL: ${SEED_API_BASE_URL:-http://api:8000/api/v1}
      FAKER_POST_COUNT: ${SEED_FAKER_POST_COUNT:-5}
      LOG_LEVEL: ${SEED_LOG_LEVEL:-INFO}
      RANDOM_SEED: 8675309
      SEED_SOURCE: "mixed"
      NULL_PROBABILITY: 0.3
      STATIC_PAYLOAD_DIR: "/mnt/data"
    volumes:
      - ./deployments/seed/data:/mnt/data:ro
    restart: "no"
    profiles: ["seed", "full"]
