services:
  api:
    build:
      context: .
      dockerfile: deployments/api/Dockerfile
    env_file:
      - .env
    environment:
      LOG_LEVEL: info
      POSTGRES_DB: stitch
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      # API connects as the app role (no DDL)
      STITCH_DB_USER: stitch_app
      STITCH_DB_PASSWORD: ${STITCH_APP_PASSWORD:?STITCH_APP_PASSWORD must be set in .env}
      AUTH_DISABLED: "true"

    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  db:
    image: postgres:17-alpine
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stitch} || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
      start_interval: 1s
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./deployments/db/00-init-roles.sh:/docker-entrypoint-initdb.d/00-init-roles.sh:ro

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  db-init:
    build:
      context: .
      dockerfile: deployments/api/Dockerfile
    env_file:
      - .env
    environment:
      STITCH_DB_SCHEMA_MODE: "if-empty"
      STITCH_DB_SEED_MODE: "never"
      STITCH_DB_SEED_PROFILE: "dev"
      # db-init connects as the migrator role (DDL + seed)
      STITCH_DB_USER: stitch_migrator
      STITCH_DB_PASSWORD: ${STITCH_MIGRATOR_PASSWORD}

    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "stitch.api.db.init_job"]
    restart: "no"

  frontend:
    build:
      context: deployments/stitch-frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:80"

volumes:
  db_data:
