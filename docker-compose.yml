services:
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  seed:
    build:
      context: .
      dockerfile: deployments/db/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
