services:

  api:
    build:
      context: .
      dockerfile: deployments/api/Dockerfile
    volumes:
      - ./deployments/api/src:/app/src
    environment:
      LOG_LEVEL: info
      POSTGRES_DB: stitch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
    - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 1s
      retries: 5
      start_period: 10s
      start_interval: 1s
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./deployments/api/scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: deployments/db/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: deployments/stitch-frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"

volumes:
  db_data:
